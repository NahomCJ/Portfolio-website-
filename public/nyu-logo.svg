    C 35 8, 38 18, 38 30
    C 38 41, 32 47, 25 49
    C 18 47, 12 41, 12 30
    C 12 18, 15 8, 25 2Z"/>

  <!-- Cup: trapezoid wider at top (cup rim), narrows to stem width -->
