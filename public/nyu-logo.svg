  <!-- Stem -->
  <rect x="19" y="61" width="12" height="23" rx="1"/>

  <!-- Base plate -->
  <rect x="5" y="83" width="40" height="9" rx="2"/>

  <!-- Foot -->
  <rect x="10" y="91" width="30" height="6" rx="1.5"/>
</svg>
